# Pipeline for this repository (gitlab_review_bot) itself.
#
# NOTE: other projects should NOT include this file. To consume the review
# jobs, include the review template directly:
#
#   include:
#     - project: 'your-group/gitlab_review_bot'
#       file: '/ci/review.gitlab-ci.yml'
#       ref: main

include:
  - local: 'ci/review.gitlab-ci.yml'
  - local: 'ci/lint.gitlab-ci.yml'
  - local: 'ci/release.gitlab-ci.yml'

stages:
  - lint
  - test     # review jobs run here (default stage, kept implicit for portability)
  - verify   # tag pipelines only
  - build    # tag pipelines only
